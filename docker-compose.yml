services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOMAIN: ${DOMAIN}
        SITE_URL: ${SITE_URL:-}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
    env_file:
      - .env.production
    expose:
      - "3000"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    command: tunnel --no-autoupdate run
    env_file:
      - .env.production
    depends_on:
      - app
    restart: unless-stopped

